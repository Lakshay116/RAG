services:
  - type: web
    name: multi-tenant-rag-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 4000
      - key: FRONTEND_URL
        value: https://multi-tenant-rag-frontend.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: CHAT_MODEL
        value: gemini-2.5-flash

  - type: web
    name: multi-tenant-rag-frontend
    runtime: static
    plan: starter
    rootDir: .
    buildCommand: npm --prefix frontend ci && npm --prefix frontend run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        value: https://multi-tenant-rag-api.onrender.com

version: "3.9"
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: multi_tenant_rag
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/multi_tenant_rag
      PORT: 4000
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-gemini-embedding-001}
      CHAT_MODEL: ${CHAT_MODEL:-gemini-2.5-flash}
    ports:
      - "4000:4000"
    depends_on:
      - postgres

volumes:
  pg_data:
